openapi: 3.1.0
info:
  title: Inline Body API
  version: 1.0.0
  description: Exercises inline (non-$ref) request/response object schemas.
paths:
  /dirs:
    post:
      operationId: mkdir
      tags: [files]
      summary: Create a directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Directory path relative to the FS root
                recursive:
                  type: boolean
                  description: Create parent directories as needed
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the directory was created
